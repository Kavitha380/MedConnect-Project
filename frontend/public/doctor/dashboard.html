<!DOCTYPE html>
<html>
<head>
  <title>Doctor Dashboard</title>
  <link rel="stylesheet" href="doctor.css">
</head>

<body>

<div class="navbar">
  <div><b>MedConnect Doctor</b></div>
  <div>
    <a href="dashboard.html">Appointments</a>
    <a href="profile.html">Profile</a>
    <a href="../index.html">Logout</a>
  </div>
</div>

<div class="container">

  <h2>Appointments</h2>

  <div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("appointments")) || [];

function load() {
  let html = "";

  data.forEach(a => {
    html += `
      <div class="card">
        <h3>${a.patientName}</h3>
        <p>${a.date} - ${a.time}</p>
        <p>Status: ${a.status}</p>

        <button onclick="view(${a.id})">View</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function view(id) {
  localStorage.setItem("currentId", id);
  window.location.href = "appointment-view.html";
}

load();
</script>

</body>
</html>
