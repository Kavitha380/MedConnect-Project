<!DOCTYPE html>
<html>
<head>
  <title>Book Appointment</title>
  <link rel="stylesheet" href="css/patient.css">
</head>

<body>

<div class="container">

  <h2>Book Appointment</h2>

  <form onsubmit="book(event)">

    <!-- PATIENT DETAILS -->
    <label>Patient Name</label>
    <input type="text" id="patientName" required>

    <label>Age</label>
    <input type="number" id="age" required>

    <label>Phone Number</label>
    <input type="text" id="phone" required>

    <!-- DOCTOR DROPDOWN -->
    <label>Select Doctor</label>
    <select id="doctor" required>
      <option value="">-- Select Doctor --</option>

      <option value="Dr. John - Cardiology">Dr. John (Cardiology) - Available</option>

      <option disabled>Dr. Priya (Neurology) - Busy</option>

      <option value="Dr. Ahmed - Orthopedic">Dr. Ahmed (Orthopedic) - Available</option>

      <option value="Dr. Meena - Dermatology">Dr. Meena (Dermatology) - Available</option>

    </select>

    <!-- APPOINTMENT DETAILS -->
    <label>Date</label>
    <input type="date" id="date" required>

    <label>Time</label>
    <input type="time" id="time" required>

    <label>Reason</label>
    <select id="reason">
      <option>General Checkup</option>
      <option>Fever</option>
      <option>Consultation</option>
    </select>

    <button class="btn">Confirm Booking</button>

  </form>

</div>

<script src="patient.js"></script>

</body>
</html>
