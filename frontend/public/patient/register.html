<!-- =================== REGISTRATION =================== -->

<div class="container my-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card shadow-lg p-4">

<div class="text-center mb-4">

<i class="bi bi-person-plus-fill display-3 text-primary"></i>

<h2 class="mt-3">Patient Registration</h2>

<p class="text-muted">
Create your MedConnect patient account
</p>

</div>

<form action="#" method="post">

<!-- ================= PERSONAL DETAILS ================= -->

<h4 class="text-primary mb-3">

<i class="bi bi-person-fill"></i>

Personal Information

</h4>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Full Name

</label>

<input
type="text"
class="form-control"
name="fullName"
placeholder="Enter Full Name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Date of Birth

</label>

<input
type="date"
class="form-control"
name="dob"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Gender

</label>

<select
class="form-select"
name="gender"
required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Blood Group

</label>

<select
class="form-select"
name="bloodGroup"
required>

<option value="">Select Blood Group</option>

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

</div>

</div>

<hr>

<!-- ================= CONTACT DETAILS ================= -->

<h4 class="text-primary mb-3">

<i class="bi bi-telephone-fill"></i>

Contact Information

</h4>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
class="form-control"
name="email"
placeholder="Enter Email"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Phone Number

</label>

<input
type="tel"
class="form-control"
name="phone"
placeholder="Enter Mobile Number"
required>

</div>

<div class="col-md-12 mb-3">

<label class="form-label">

Address

</label>

<textarea
class="form-control"
rows="3"
name="address"
placeholder="Enter Address"></textarea>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

City

</label>

<input
type="text"
class="form-control"
name="city">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

State

</label>

<input
type="text"
class="form-control"
name="state">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

Pincode

</label>

<input
type="text"
class="form-control"
name="pincode">

</div>

</div>

<hr>
<button type="submit" class="btn btn-primary w-100">
Register
</button>
</form>
</div>
</div>
</div>
</div>
