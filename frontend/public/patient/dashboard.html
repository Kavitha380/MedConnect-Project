<!DOCTYPE html>
<html>
<head>
  <title>Patient Dashboard</title>
  <link rel="stylesheet" href="css/patient.css">
</head>

<body>

<div class="navbar">
  <div><b>MedConnect</b></div>
  <div>
    <a href="dashboard.html">Dashboard</a>
    <a href="book-appoinment.html">Book Appointment</a>
    <a href="appoinment-history.html">My Appointments</a>
    <a href="profile.html">Profile</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

<div class="container">

  <h2>Find Doctors</h2>

  <input class="search-box"
         placeholder="Search specialization or doctor name..."
         onkeyup="searchDoctors(this.value)">

  <div class="grid" id="doctorList"></div>

</div>

<script>
// ---------------- DOCTOR DATA ----------------
let doctors = JSON.parse(localStorage.getItem("doctors")) || [
  { id: 1, name: "Dr. John", spec: "Cardiology", status: "Available" },
  { id: 2, name: "Dr. Priya", spec: "Neurology", status: "Busy" },
  { id: 3, name: "Dr. Ahmed", spec: "Orthopedic", status: "Available" },
  { id: 4, name: "Dr. Meena", spec: "Dermatology", status: "Available" }
];

localStorage.setItem("doctors", JSON.stringify(doctors));

// ---------------- LOAD ----------------
window.onload = function () {
  displayDoctors(doctors);
};

// ---------------- DISPLAY ----------------
function displayDoctors(list) {
  let html = "";

  list.forEach(doc => {
    html += `
      <div class="card">
        <h3>${doc.name}</h3>
        <p>Specialization: ${doc.spec}</p>

        <span class="status ${doc.status}">
          ${doc.status}
        </span>

        <button class="btn"
          onclick="bookDoctor('${doc.name}')"
          ${doc.status === "Busy" ? "disabled" : ""}>
          Book Appointment
        </button>
      </div>
    `;
  });

  document.getElementById("doctorList").innerHTML = html;
}

// ---------------- SEARCH ----------------
function searchDoctors(value) {
  value = value.toLowerCase();

  let filtered = doctors.filter(d =>
    d.spec.toLowerCase().includes(value) ||
    d.name.toLowerCase().includes(value)
  );

  displayDoctors(filtered);
}

// ---------------- BOOK DOCTOR ----------------
function bookDoctor(name) {
  localStorage.setItem("selectedDoctor", name);
  window.location.href = "book-appoinment.html";
}

// ---------------- LOGOUT ----------------
function logout() {
  localStorage.clear();
  window.location.href = "../index.html";
}
</script>

</body>
</html>
