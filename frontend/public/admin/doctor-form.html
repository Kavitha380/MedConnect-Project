<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Doctor - MedConnect Admin</title>

    <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <h2>MedConnect</h2>
            <p>Admin Panel</p>
        </div>

        <ul class="menu">

            <li>
                <a href="dashboard.html">🏠 Dashboard</a>
            </li>

            <li class="active">
                <a href="doctors.html">👨‍⚕️ Doctors</a>
            </li>

            <li>
                <a href="appointments.html">📅 Appointments</a>
            </li>

            <li>
                <a href="hospitals.html">🏥 Hospitals</a>
            </li>

            <li>
                <a href="login.html">🚪 Logout</a>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Header -->
        <header class="topbar">

            <div>
                <h1>Add Doctor</h1>
                <p>Enter doctor details</p>
            </div>

            <div class="admin-profile">
                👤 Admin
            </div>

        </header>

        <!-- Form -->
        <div class="content-box">

            <div class="page-header">
                <h2>Doctor Information</h2>
            </div>

            <form>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Doctor Name</label>
                        <input type="text" placeholder="Enter doctor name">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter email">
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="Enter phone number">
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select>
                            <option>Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date">
                    </div>

                    <div class="form-group">
                        <label>Qualification</label>
                        <input type="text" placeholder="MBBS, MD...">
                    </div>

                    <div class="form-group">
                        <label>Experience (Years)</label>
                        <input type="number" placeholder="Experience">
                    </div>

                    <div class="form-group">
                        <label>Specialization</label>
                        <select>
                            <option>Select Specialization</option>
                            <option>Cardiology</option>
                            <option>Dermatology</option>
                            <option>Neurology</option>
                            <option>Orthopedics</option>
                            <option>Pediatrics</option>
                            <option>Gynecology</option>
                            <option>ENT</option>
                            <option>General Physician</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Hospital</label>
                        <select>
                            <option>Select Hospital</option>
                            <option>Hospital Name</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Consultation Fee</label>
                        <input type="number" placeholder="Enter fee">
                    </div>

                    <div class="form-group full-width">
                        <label>Clinic Address</label>
                        <textarea rows="4" placeholder="Enter address"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Profile Photo</label>
                        <input type="file">
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" placeholder="Create username">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Create password">
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" placeholder="Confirm password">
                    </div>

                </div>

                <div class="form-buttons">

                    <button type="submit" class="primary-btn">
                        Save Doctor
                    </button>

                    <button type="reset" class="secondary-btn">
                        Reset
                    </button>

                    <a href="doctors.html" class="secondary-btn">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </main>

</div>

</body>
</html>
